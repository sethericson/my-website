    --bg-1: #0a0a0c;
    --bg-2: #121216;
    --ink-0: #ffffff;
    --ink-1: #f5f5f7;
    --ink-2: #a1a1a6;
    --ink-3: #6e6e73;
    --ink-4: #3a3a3c;
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);

    --c-hero:     #5e8bff;
    --c-acad:     #8b5cf6;
    --c-teams:    #2dd4bf;
    --c-sched:    #f472b6;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {

    color: var(--ink-1);

    letter-spacing: -0.003em;
    min-height: 100vh;
  }
  ::selection { background: var(--c-hero); color: #fff; }

  /* ---------- Nav ---------- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    backdrop-filter: saturate(180%) blur(22px);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    background: rgba(0, 0, 0, 0.62);
    border-bottom: 1px solid var(--line);
    transition: transform 300ms var(--ease);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 13px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    font-weight: 600; letter-spacing: -0.01em; font-size: 14px;
    color: var(--ink-1); text-decoration: none;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    color: var(--ink-2); text-decoration: none; font-size: 13px; font-weight: 400;
    transition: color 200ms var(--ease);
  }
  .nav-links a:hover, .nav-links a.active { color: var(--ink-0); }
  @media (max-width: 680px) {
    .nav-inner { padding: 11px 18px; }
    .nav-links { gap: 16px; }
    .nav-links a { font-size: 12.5px; }
  }

  /* ---------- Hero ---------- */
  .vault-hero {
    position: relative;
    padding: 140px 28px 60px;
    overflow: hidden;
    background: #000;
  }
  .vault-hero-bg {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 900px 500px at 30% 0%, rgba(94, 139, 255, 0.22), transparent 55%),
      radial-gradient(ellipse 700px 500px at 80% 100%, rgba(244, 114, 182, 0.16), transparent 60%),
      radial-gradient(ellipse 600px 400px at 50% 50%, rgba(45, 212, 191, 0.06), transparent 60%),
      linear-gradient(180deg, #000 0%, #07070a 100%);
  }
  .vault-hero::after {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.07) 1px, transparent 0);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 0%, transparent 80%);
    opacity: 0.5;
  }
  .vault-hero-inner {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    text-align: center;
  }
  .vault-kicker {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 7px 14px 7px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
    font-size: 12.5px; font-weight: 500;
    color: var(--ink-1);
    margin-bottom: 28px;
  }
  .vault-kicker .grad-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, var(--c-hero), var(--c-sched));
    box-shadow: 0 0 10px rgba(94, 139, 255, 0.6);
  }
  .vault-kicker .div { width: 1px; height: 12px; background: var(--line-strong); }
  .vault-kicker .muted { color: var(--ink-3); }

  .vault-title {
    font-size: clamp(56px, 11vw, 132px);
    font-weight: 600;
    letter-spacing: -0.05em;
    line-height: 0.96;
    color: var(--ink-0);
    margin-bottom: 24px;
    background: linear-gradient(180deg, #ffffff 0%, #c7cad1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .vault-sub {
    font-size: clamp(16px, 1.6vw, 19px);
    color: var(--ink-2);
    font-weight: 400;
    max-width: 640px;
    margin: 0 auto;
    letter-spacing: -0.01em;
  }

  /* ---------- Vault grid ---------- */
  .vault-section {
    padding: 80px 28px 120px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #07070a 0%, #000 100%);
  }
  .vault-section .glow-1 {
    position: absolute;
    top: -100px; left: -100px;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.3;
    background: radial-gradient(circle, rgba(94, 139, 255, 0.25), transparent 70%);
    pointer-events: none;
  }
  .vault-section .glow-2 {
    position: absolute;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.3;
    background: radial-gradient(circle, rgba(244, 114, 182, 0.18), transparent 70%);
    pointer-events: none;
  }

  .vault-container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
  }

  .vault-row-label {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);

    flex-wrap: wrap;

  .vault-row-label h2 {

    letter-spacing: 0.05em;

    color: var(--c-hero); font-weight: 600;
    padding: 3px 9px;
    border: 1px solid rgba(94, 139, 255, 0.35);
    border-radius: 999px;
    background: rgba(94, 139, 255, 0.08);
  }

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;

  @media (max-width: 480px) {

    border-color: var(--line-strong);
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(94, 139, 255, 0.08);

    width: 100%;
    padding-bottom: 56.25%; /* 16:9 */

    overflow: hidden;

    width: 100%; height: 100%;

<script>
  // IntersectionObserver reveal
  (function () {
    const items = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      items.forEach(el => el.classList.add('visible'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), (i % 8) * 50);
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    items.forEach(el => io.observe(el));
  })();

  // Nav hide on scroll down / show on scroll up
  (function () {
    const nav = document.querySelector('nav');
    let last = window.scrollY;
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (ticking) return;
      window.requestAnimationFrame(() => {
        const y = window.scrollY;
        if (y > last && y > 120) {
          nav.style.transform = 'translateY(-100%)';
        } else {
          nav.style.transform = 'translateY(0)';
        }
        last = y;
        ticking = false;
      });
      ticking = true;
    }, { passive: true });
  })();
</script>
